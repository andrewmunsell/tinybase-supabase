name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.2
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:unit
      - run: supabase start
      - name: Configure local Supabase test environment
        run: |
          eval "$(supabase status -o env)"
          echo "SUPABASE_TEST_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_TEST_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
      - run: pnpm test:integration
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build
      - run: pnpm docs:build
      - run: pnpm pack --pack-destination .artifacts
      - if: always()
        run: supabase stop --no-backup
